name: CI - Cypress Mass Download
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          browser: chrome   # downloads costumam ser mais estáveis no Chrome
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Salva os arquivos baixados pra inspeção, se algum teste falhar
      - name: Upload downloads on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-downloads
          path: cypress/downloads